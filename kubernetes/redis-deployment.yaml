apiVersion: apps/v1
kind: Deployment
metadata:
  name: krishi-ai-redis
  namespace: krishi-ai
  labels:
    app.kubernetes.io/name: krishi-ai-redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: krishi-ai-platform
    app.kubernetes.io/managed-by: kubeorch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: krishi-ai-redis
  template:
    metadata:
      labels:
        app: krishi-ai-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          command:
            - redis-server
            - --appendonly
            - "yes"
            - --maxmemory
            - 256mb
            - --maxmemory-policy
            - allkeys-lru
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
