apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: krishi-ai-postgres-pvc
  namespace: krishi-ai
  labels:
    app.kubernetes.io/name: krishi-ai
    app.kubernetes.io/component: postgres
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: standard
---
