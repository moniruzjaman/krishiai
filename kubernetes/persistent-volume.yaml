kind: PersistentVolumeClaim
metadata:
  name: krishi-ai-models-pvc
  namespace: krishi-ai
  labels:
    app.kubernetes.io/name: krishi-ai
    app.kubernetes.io/component: backend
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: krishi-ai-uploads-pvc
  namespace: krishi-ai
  labels:
    app.kubernetes.io/name: krishi-ai
    app.kubernetes.io/component: backend
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard
