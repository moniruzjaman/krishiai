apiVersion: apps/v1
kind: Deployment
metadata:
  name: krishi-ai-web
  namespace: krishi-ai
  labels:
    app.kubernetes.io/name: krishi-ai-web
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: krishi-ai-platform
    app.kubernetes.io/managed-by: kubeorch
spec:
  replicas: 2
  selector:
    matchLabels:
      app: krishi-ai-web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: krishi-ai-web
    spec:
      containers:
        - name: web
          image: moniruzjaman/krishi-ai-web:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
