apiVersion: apps/v1
kind: Deployment
metadata:
  name: krishi-ai-backend
  namespace: krishi-ai
  labels:
    app.kubernetes.io/name: krishi-ai-backend
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: krishi-ai-platform
    app.kubernetes.io/managed-by: kubeorch
spec:
  replicas: 3
  selector:
    matchLabels:
      app: krishi-ai-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: krishi-ai-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: backend
          image: moniruzjaman/krishi-ai-backend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: krishi-ai-config
            - secretRef:
                name: krishi-ai-secrets
          env:
            - name: DATABASE_URL
              value: "postgresql://krishi_user:$(DATABASE_PASSWORD)@postgres-service:5432/krishi_ai"
            - name: REDIS_URL
              value: "redis://redis-service:6379"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 1000m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: models-storage
              mountPath: /app/models
            - name: uploads-storage
              mountPath: /app/uploads
      volumes:
        - name: models-storage
          persistentVolumeClaim:
            claimName: krishi-ai-models-pvc
        - name: uploads-storage
          persistentVolumeClaim:
            claimName: krishi-ai-uploads-pvc
      terminationGracePeriodSeconds: 30
